<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parimutuel Pony Derby</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a2e; color: #ecf0f1; text-align: center; padding: 10px; }
        h1 { color: #f1c40f; margin-bottom: 5px; }
        
        /* Dashboard & Controls */
        .betting-board { background: linear-gradient(145deg, #16213e, #0f172a); border: 2px solid #3498db; border-radius: 12px; padding: 25px; max-width: 600px; margin: 0 auto 30px auto; box-shadow: 0 8px 32px rgba(52, 152, 219, 0.2); display: flex; flex-direction: column; gap: 20px; }
        .board-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding-bottom: 15px; }
        .board-header h2 { margin: 0; color: #ecf0f1; font-size: 1.5em; }
        .timer-display { background: #000; color: #00ffcc; padding: 8px 15px; border-radius: 6px; font-family: monospace; font-size: 1.4em; font-weight: bold; border: 1px solid #00ffcc; }
        
        .input-group { display: flex; flex-direction: column; text-align: left; flex: 1; min-width: 120px; }
        .input-group label { font-size: 0.85em; color: #a0aec0; margin-bottom: 5px; text-transform: uppercase; font-weight: bold; }
        select, input { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid #4a5568; color: white; border-radius: 6px; font-size: 1em; box-sizing: border-box; }
        
        .action-btn { padding: 12px 25px; background: #3498db; color: white; border: none; border-radius: 6px; font-size: 1.1em; font-weight: bold; cursor: pointer; transition: 0.2s; height: 44px; }
        .action-btn:hover:not(:disabled) { background: #2980b9; }
        #race-btn { background: #8247e5; }
        #race-btn:hover:not(:disabled) { background: #9d68ec; }
        button:disabled { background: #4a5568 !important; color: #a0aec0 !important; cursor: not-allowed !important; }

        /* Racetrack */
        .track-container { width: 95%; max-width: 1000px; margin: 0 auto; background: #27ae60; border: 5px solid #ecf0f1; border-radius: 5px; position: relative; padding: 5px 0; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .lane { height: 40px; border-bottom: 2px dashed rgba(255, 255, 255, 0.4); position: relative; display: flex; align-items: center; }
        .lane:last-child { border-bottom: none; }
        .pony { font-size: 28px; position: absolute; left: 0%; transition: left 0.1s linear; z-index: 2; }
        .finish-line { position: absolute; right: 50px; top: 0; bottom: 0; width: 10px; background: repeating-linear-gradient(0deg, #fff, #fff 10px, #000 10px, #000 20px); z-index: 1; }
        .pony-name-label { position: absolute; left: 10px; color: white; font-weight: bold; font-size: 0.9em; text-shadow: 1px 1px 2px black; z-index: 3; }
        
        #message-board { margin-top: 20px; font-size: 1.3em; font-weight: bold; min-height: 30px; color: #f1c40f; }
        
        .admin-toggle-btn { background: none; border: 1px solid #e74c3c; color: #e74c3c; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.8em; margin-bottom: 15px;}
        .admin-toggle-btn:hover { background: rgba(231, 76, 60, 0.1); }
    </style>
</head>
<body>

    <h1>🏁 Parimutuel Derby 🏁</h1>
    <button class="admin-toggle-btn" onclick="toggleAdminPanel()">🔧 Toggle Admin Panel</button>

    <!-- 👑 ADMIN PANEL -->
    <div id="admin-panel" class="betting-board" style="display: none; border-color: #e74c3c;">
        <div class="board-header">
            <h2>👑 Admin Control Center</h2>
        </div>
        
        <div class="betting-controls" style="flex-wrap: wrap;">
            <div class="input-group">
                <label>Number of Ponies (8 - 16)</label>
                <input type="number" id="admin-pony-count" value="8" min="8" max="16" onchange="generateAdminNameInputs()">
            </div>
            <div class="input-group">
                <label>Countdown Timer (Seconds)</label>
                <input type="number" id="admin-timer" value="15" min="5">
            </div>
        </div>

        <div id="admin-names-container" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;"></div>
        <button id="create-race-btn" class="action-btn" onclick="adminCreateRace()" style="width: 100%; background: #e74c3c; margin-top: 15px;">Setup Custom Track & Start Timer</button>
    </div>

    <!-- 👤 PLAYER PANEL -->
    <div class="betting-board" id="player-panel">
        <div class="board-header">
            <h2>Live Betting Pool</h2>
            <div class="timer-display" id="race-timer">00:00</div>
        </div>

        <div style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-around; align-items: center;">
            <div>💰 Your Bankroll: <span id="bankroll-display" style="color: #2ecc71; font-weight: bold; font-size: 1.2em;">1000</span> Tokens</div>
            <div>📊 Total Race Pool: <span id="total-pool-display" style="color: #f1c40f; font-weight: bold; font-size: 1.2em;">0</span> Tokens</div>
        </div>

        <div class="betting-controls" style="flex-wrap: wrap;">
            <div class="input-group">
                <label>Select Pony</label>
                <select id="pony-select"></select>
            </div>
            <div class="input-group">
                <label>Bet Amount</label>
                <input type="number" id="bet-amount" value="50" min="1">
            </div>
            <button id="race-btn" class="action-btn" onclick="placeLocalBet()">Place Bet</button>
        </div>
    </div>

    <!-- 🏇 DYNAMIC TRACK -->
    <div class="track-container" id="dynamic-track">
        <div class="finish-line"></div>
    </div>

    <div id="message-board">Set up a race in the Admin Panel to begin!</div>

    <script>
        // Global Game Engine State
        let bankroll = 1000;
        let activePonies = [];
        let raceState = "closed"; // closed, open, racing
        let totalPool = 0;
        let ponyPools = [];      // Tracks pool size for each individual pony
        let playerBets = [];     // Tracks amount player spent on each individual pony
        let countdownInterval = null;
        let raceInterval = null;

        const DEFAULT_NAMES = ["Thunder", "Hoof Hearted", "Glue Stick", "Lightning", "Usain Colt", "Hay Girl", "Soprano", "Mane", "Trotter", "Secretariat", "Biscuit", "Shadowfax", "Pegasus", "Nightmare", "Bojack", "Roach"];

        function setMessage(msg, color = "#f1c40f") {
            const msgBoard = document.getElementById('message-board');
            msgBoard.innerText = msg;
            msgBoard.style.color = color;
        }

        function toggleAdminPanel() {
            const panel = document.getElementById('admin-panel');
            panel.style.display = panel.style.display === "none" ? "flex" : "none";
        }

        // --- 1. ADMIN PANEL INITIALIZATION ---
        function generateAdminNameInputs() {
            const container = document.getElementById('admin-names-container');
            let count = parseInt(document.getElementById('admin-pony-count').value) || 8;
            if (count < 8) count = 8; 
            if (count > 16) count = 16;
            document.getElementById('admin-pony-count').value = count;
            
            container.innerHTML = "";
            for (let i = 0; i < count; i++) {
                container.innerHTML += `
                    <div class="input-group">
                        <label>Lane ${i + 1}</label>
                        <input type="text" id="admin-name-${i}" value="${DEFAULT_NAMES[i] || 'Pony ' + (i+1)}">
                    </div>`;
            }
        }

        // --- 2. GENERATE TRACK DYNAMICALLY ---
        function adminCreateRace() {
            if (raceState === "racing") {
                setMessage("Cannot create a race while a live derby is running!", "#e74c3c");
                return;
            }
            clearInterval(countdownInterval);

            const count = parseInt(document.getElementById('admin-pony-count').value);
            const duration = parseInt(document.getElementById('admin-timer').value);
            
            activePonies = [];
            ponyPools = new Array(count).fill(0);
            playerBets = new Array(count).fill(0);
            totalPool = 0;

            document.getElementById('total-pool-display').innerText = totalPool;

            for (let i = 0; i < count; i++) {
                activePonies.push(document.getElementById(`admin-name-${i}`).value);
            }

            buildDynamicTrack(activePonies);
            raceState = "open";
            
            document.getElementById('race-btn').disabled = false;
            document.getElementById('pony-select').disabled = false;
            document.getElementById('bet-amount').disabled = false;

            startCountdown(duration);
            setMessage("🏆 Betting is now OPEN! Place your bets before time runs out.", "#2ecc71");
        }

        function buildDynamicTrack(namesArray) {
            const track = document.getElementById('dynamic-track');
            const dropdown = document.getElementById('pony-select');
            
            dropdown.innerHTML = "";
            track.innerHTML = `<div class="finish-line"></div>`;

            for (let i = 0; i < namesArray.length; i++) {
                dropdown.innerHTML += `<option value="${i}">${i + 1}. ${namesArray[i]}</option>`;
                track.innerHTML += `
                    <div class="lane">
                        <span class="pony-name-label">${i + 1}. ${namesArray[i]}</span>
                        <div class="pony" id="pony-${i}">🐎</div>
                    </div>`;
            }
        }

        // --- 3. BETTING POOL MATH ---
        function placeLocalBet() {
            if (raceState !== "open") {
                setMessage("Betting is currently closed!", "#e74c3c");
                return;
            }

            const ponyId = parseInt(document.getElementById('pony-select').value);
            const amount = parseInt(document.getElementById('bet-amount').value);

            if (isNaN(amount) || amount <= 0) {
                setMessage("Please enter a valid bet amount.", "#e74c3c");
                return;
            }
            if (amount > bankroll) {
                setMessage("Insufficient tokens in your bankroll!", "#e74c3c");
                return;
            }

            // Deduct from bankroll and add to pools
            bankroll -= amount;
            totalPool += amount;
            ponyPools[ponyId] += amount;
            playerBets[ponyId] += amount;

            // Update UI displays
            document.getElementById('bankroll-display').innerText = bankroll;
            document.getElementById('total-pool-display').innerText = totalPool;

            // Generate simulated opposing house bets to simulate real pari-mutuel shifts
            simulateOpposingBets(count = activePonies.length);

            setMessage(`Bet of ${amount} Tokens placed on ${activePonies[ponyId]}!`, "#2ecc71");
        }

        // Simulates other random players buying tickets to build the dynamic payout pool
        function simulateOpposingBets(count) {
            const randomAdditions = Math.floor(Math.random() * 3) + 1;
            for(let i=0; i < randomAdditions; i++) {
                let randomPony = Math.floor(Math.random() * count);
                let randomAmount = Math.floor(Math.random() * 80) + 20;
                totalPool += randomAmount;
                ponyPools[randomPony] += randomAmount;
            }
            document.getElementById('total-pool-display').innerText = totalPool;
        }

        // --- 4. COUNTDOWN ENGINE ---
        function startCountdown(seconds) {
            const timerDisplay = document.getElementById('race-timer');
            let timeLeft = seconds;

            countdownInterval = setInterval(() => {
                if (timeLeft <= 0) {
                    clearInterval(countdownInterval);
                    timerDisplay.innerText = "00:00";
                    startVisualRace();
                } else {
                    const mins = Math.floor(timeLeft / 60).toString().padStart(2, '0');
                    const secs = (timeLeft % 60).toString().padStart(2, '0');
                    timerDisplay.innerText = `${mins}:${secs}`;
                    timeLeft--;
                }
            }, 1000);
        }

        // --- 5. ANIMATION ENGINE ---
        function startVisualRace() {
            raceState = "racing";
            document.getElementById('race-btn').disabled = true;
            document.getElementById('pony-select').disabled = true;
            document.getElementById('bet-amount').disabled = true;
            
            setMessage("🎺 AND THEY'RE OFF! 🎺", "#f1c40f");

            const ponyElements = [];
            for (let i = 0; i < activePonies.length; i++) {
                let el = document.getElementById('pony-' + i);
                el.style.left = "0%";
                ponyElements.push(el);
            }
            
            let positions = new Array(activePonies.length).fill(0);
            let finishOrder = []; 
            const finishLinePercentage = 88; 
            
            raceInterval = setInterval(() => {
                for (let i = 0; i < activePonies.length; i++) {
                    if (!finishOrder.includes(i)) {
                        // Incremental steps forward
                        positions[i] += (Math.random() * 2.5) + 0.4;
                        ponyElements[i].style.left = positions[i] + "%";
                        
                        if (positions[i] >= finishLinePercentage) {
                            finishOrder.push(i);
                        }
                    }
                }

                if (finishOrder.length >= activePonies.length) {
                    clearInterval(raceInterval);
                    resolveRaceRewards(finishOrder[0]);
                }
            }, 80); 
        }

        // --- 6. PARIMUTUEL CALCULATIONS ---
        function resolveRaceRewards(winningPonyIndex) {
            raceState = "closed";
            const winnerName = activePonies[winningPonyIndex];
            
            let resultsMessage = `🏆 Race Finished! 1st Place: ${winnerName}. `;
            
            // 10% House Fee Deducted From Total Pool
            const adminFee = Math.floor(totalPool * 0.10);
            const rewardPool = totalPool - adminFee;
            
            const winningPonyTotalBets = ponyPools[winningPonyIndex];
            const userBetOnWinner = playerBets[winningPonyIndex];

            if (userBetOnWinner > 0) {
                // Parimutuel Payout Formula: (User Bet / Total Pool on Winner) * Reward Pool
                const userPayout = Math.floor((userBetOnWinner * rewardPool) / winningPonyTotalBets);
                bankroll += userPayout;
                document.getElementById('bankroll-display').innerText = bankroll;
                
                resultsMessage += `💰 Congratulations! You won ${userPayout} Tokens! (10% admin fee deducted from global pool).`;
                setMessage(resultsMessage, "#2ecc71");
            } else {
                resultsMessage += `💸 Better luck next time! Your bet slips expired without value.`;
                setMessage(resultsMessage, "#e74c3c");
            }
        }

        // Initialize setup inputs automatically on load
        window.onload = function() {
            generateAdminNameInputs();
        };
    </script>
</body>
</html>
