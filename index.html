<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 Pony Race Betting Game</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: #ecf0f1;
            text-align: center;
            padding: 10px;
        }
        h1 { color: #f1c40f; margin-bottom: 5px; }
        
        /* Dashboard & Web3 Wallet Styles */
        .dashboard {
            background: #16213e;
            padding: 20px;
            border-radius: 10px;
            display: inline-block;
            margin-bottom: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            border: 2px solid #8247e5; /* Polygon Purple */
        }
        .stats { font-size: 1.5em; font-weight: bold; color: #2ecc71; margin-bottom: 15px; }
        .wallet-info { font-family: monospace; color: #00ffcc; margin-bottom: 15px; }
        
        .controls input, .controls select, .controls button {
            padding: 8px; font-size: 1em; margin: 5px; border-radius: 5px; border: none;
        }
        
        #connect-btn { background-color: #8247e5; color: white; cursor: pointer; font-weight: bold; }
        #connect-btn:hover { background-color: #6c3abf; }
        
        #race-btn { background-color: #e74c3c; color: white; cursor: pointer; font-weight: bold; }
        #race-btn:hover { background-color: #c0392b; }
        button:disabled { background-color: #7f8c8d !important; cursor: not-allowed !important; }
        
        /* Track Styles */
        .track-container {
            width: 95%; max-width: 1000px; margin: 0 auto; background: #27ae60;
            border: 5px solid #ecf0f1; border-radius: 5px; position: relative;
            padding: 5px 0; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .lane {
            height: 40px; border-bottom: 2px dashed rgba(255, 255, 255, 0.4);
            position: relative; display: flex; align-items: center;
        }
        .lane:last-child { border-bottom: none; }
        .pony { font-size: 28px; position: absolute; left: 0%; transition: left 0.1s linear; z-index: 2; }
        .finish-line {
            position: absolute; right: 50px; top: 0; bottom: 0; width: 10px;
            background: repeating-linear-gradient(0deg, #fff, #fff 10px, #000 10px, #000 20px); z-index: 1;
        }
        .pony-name-label {
            position: absolute; left: 10px; color: white; font-weight: bold;
            font-size: 0.9em; text-shadow: 1px 1px 2px black; z-index: 3; opacity: 0.8;
        }
        
        #message-board { margin-top: 20px; font-size: 1.3em; font-weight: bold; min-height: 30px; color: #f1c40f; }
    </style>
</head>
<body>

    <h1>🏁 Web3 Polygon Derby 🏁</h1>
    <p>Connect your wallet to race! (Pays 10-to-1)</p>

    <div class="dashboard">
        <div class="wallet-info">Wallet: <span id="wallet-address">Not Connected</span></div>
        <div class="stats">💰 Game Bankroll: $<span id="bankroll">100</span></div>
        
        <div class="controls">
            <button id="connect-btn" onclick="connectAndEnforcePolygon()">Connect MetaMask</button>
            <br><br>
            <select id="pony-select" disabled>
                <option value="0">1. Thunder</option>
                <option value="1">2. Hoof Hearted</option>
                <option value="2">3. Glue Stick</option>
                <option value="3">4. Lightning</option>
                <option value="4">5. Usain Colt</option>
                <option value="5">6. Hay Girl Hay</option>
                <option value="6">7. Pony Soprano</option>
                <option value="7">8. Mane Attraction</option>
                <option value="8">9. Trotter</option>
                <option value="9">10. Secretariat</option>
            </select>
            <input type="number" id="bet-amount" placeholder="Bet Amount" min="1" max="100" value="10" disabled>
            <button id="race-btn" onclick="startRace()" disabled>Place Bet & Race!</button>
        </div>
    </div>

    <div class="track-container">
        <div class="finish-line"></div>
        <div class="lane"><span class="pony-name-label">Thunder</span><div class="pony" id="pony-0">🐎</div></div>
        <div class="lane"><span class="pony-name-label">Hoof Hearted</span><div class="pony" id="pony-1">🐎</div></div>
        <div class="lane"><span class="pony-name-label">Glue Stick</span><div class="pony" id="pony-2">🐎</div></div>
        <div class="lane"><span class="pony-name-label">Lightning</span><div class="pony" id="pony-3">🐎</div></div>
        <div class="lane"><span class="pony-name-label">Usain Colt</span><div class="pony" id="pony-4">🐎</div></div>
        <div class="lane"><span class="pony-name-label">Hay Girl Hay</span><div class="pony" id="pony-5">🐎</div></div>
        <div class="lane"><span class="pony-name-label">Pony Soprano</span><div class="pony" id="pony-6">🐎</div></div>
        <div class="lane"><span class="pony-name-label">Mane Attraction</span><div class="pony" id="pony-7">🐎</div></div>
        <div class="lane"><span class="pony-name-label">Trotter</span><div class="pony" id="pony-8">🐎</div></div>
        <div class="lane"><span class="pony-name-label">Secretariat</span><div class="pony" id="pony-9">🐎</div></div>
    </div>

    <div id="message-board">Please connect your Polygon wallet to play.</div>

    <script>
      // --- WEB3 CONNECTION LOGIC ---
        const POLYGON_CHAIN_ID = '0x89'; // 137 in hex
        let userWalletAddress = null;

        // Automatically check for a wallet as soon as the page loads
        function checkWalletAvailability() {
            if (typeof window.ethereum === 'undefined') {
                setMessage("❌ No Web3 wallet detected! Please install MetaMask to play.", "#e74c3c");
                const connectBtn = document.getElementById('connect-btn');
                connectBtn.innerText = "MetaMask Required";
                connectBtn.disabled = true;
                connectBtn.style.backgroundColor = "#7f8c8d";
                return false;
            }
            return true;
        }

        async function connectAndEnforcePolygon() {
            // Guard check
            if (!checkWalletAvailability()) return;

            try {
                setMessage("Requesting connection...", "#00ffcc");
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                const currentChainId = await window.ethereum.request({ method: 'eth_chainId' });

                if (currentChainId !== POLYGON_CHAIN_ID) {
                    setMessage("Switching to Polygon Network...");
                    try {
                        await window.ethereum.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: POLYGON_CHAIN_ID }] });
                    } catch (switchError) {
                        // Error code 4902 means the network isn't added to MetaMask yet
                        if (switchError.code === 4902) {
                            try {
                                setMessage("Adding Polygon to wallet...");
                                await window.ethereum.request({
                                    method: 'wallet_addEthereumChain',
                                    params: [{
                                        chainId: POLYGON_CHAIN_ID,
                                        chainName: 'Polygon Mainnet',
                                        nativeCurrency: { name: 'MATIC', symbol: 'MATIC', decimals: 18 },
                                        rpcUrls: ['https://polygon-rpc.com/'],
                                        blockExplorerUrls: ['https://polygonscan.com/']
                                    }],
                                });
                            } catch (addError) {
                                setMessage("Failed to add Polygon network.", "#e74c3c");
                                return;
                            }
                        } else {
                            setMessage("Please switch to Polygon in your wallet.", "#e74c3c");
                            return;
                        }
                    }
                }

                // Connected successfully! Unlock the game.
                userWalletAddress = accounts[0];
                document.getElementById('wallet-address').innerText = userWalletAddress.substring(0, 6) + "..." + userWalletAddress.substring(38);
                document.getElementById('connect-btn').style.display = "none"; 
                
                document.getElementById('pony-select').disabled = false;
                document.getElementById('bet-amount').disabled = false;
                document.getElementById('race-btn').disabled = false;
                
                setMessage("✅ Connected to Polygon! Place your bets.");
            } catch (error) {
                setMessage("Connection rejected.", "#e74c3c");
            }
        }

        // --- GAME ANIMATION LOGIC ---
        let bankroll = 100;
        const ponies = ["Thunder", "Hoof Hearted", "Glue Stick", "Lightning", "Usain Colt", "Hay Girl Hay", "Pony Soprano", "Mane Attraction", "Trotter", "Secretariat"];
        let isRacing = false;

        function updateBankrollDisplay() {
            document.getElementById('bankroll').innerText = bankroll;
            document.getElementById('bet-amount').max = bankroll;
        }

        function setMessage(msg, color = "#f1c40f") {
            const msgBoard = document.getElementById('message-board');
            msgBoard.innerText = msg;
            msgBoard.style.color = color;
        }

        function startRace() {
            if (isRacing || !userWalletAddress) return;

            const betInput = document.getElementById('bet-amount');
            const betAmount = parseInt(betInput.value);
            const selectedPonyIndex = parseInt(document.getElementById('pony-select').value);

            if (isNaN(betAmount) || betAmount <= 0) {
                setMessage("Please enter a valid bet amount!", "#e74c3c"); return;
            }
            if (betAmount > bankroll) {
                setMessage("You don't have enough money for that bet!", "#e74c3c"); return;
            }

            // Lock controls
            bankroll -= betAmount;
            updateBankrollDisplay();
            isRacing = true;
            document.getElementById('race-btn').disabled = true;
            document.getElementById('pony-select').disabled = true;
            betInput.disabled = true;

            setMessage("🎺 AND THEY'RE OFF! 🎺");

            const ponyElements = [];
            for (let i = 0; i < 10; i++) {
                let el = document.getElementById('pony-' + i);
                el.style.left = "0%";
                ponyElements.push(el);
            }
            let positions = new Array(10).fill(0);
            const finishLinePercentage = 88; 
            
            const raceInterval = setInterval(() => {
                let raceOver = false;
                let winnerIndex = -1;

                for (let i = 0; i < ponies.length; i++) {
                    positions[i] += (Math.random() * 2) + 0.3;
                    ponyElements[i].style.left = positions[i] + "%";
                    if (positions[i] >= finishLinePercentage) {
                        raceOver = true;
                        if (winnerIndex === -1 || positions[i] > positions[winnerIndex]) {
                            winnerIndex = i;
                        }
                    }
                }

                if (raceOver) {
                    clearInterval(raceInterval);
                    handleRaceResults(winnerIndex, selectedPonyIndex, betAmount);
                }
            }, 100); 
        }

        function handleRaceResults(winnerIndex, betIndex, betAmount) {
            const winningPony = ponies[winnerIndex];
            if (winnerIndex === betIndex) {
                const winnings = betAmount * 10;
                bankroll += winnings;
                setMessage(`🏆 ${winningPony} wins! 🎉 You won $${winnings}!`, "#2ecc71");
            } else {
                setMessage(`🏆 ${winningPony} wins! 💸 You lost $${betAmount}.`, "#e74c3c");
            }
            updateBankrollDisplay();
            if (bankroll <= 0) {
                setMessage("💀 You're out of money! Game Over.", "#c0392b");
            } else {
                isRacing = false;
                document.getElementById('race-btn').disabled = false;
                document.getElementById('pony-select').disabled = false;
                document.getElementById('bet-amount').disabled = false;
            }
        }

        // Run the wallet check immediately when the window loads
        window.onload = function() {
            checkWalletAvailability();
            
            // Setup listeners if wallet exists
            if (window.ethereum) {
                window.ethereum.on('chainChanged', () => window.location.reload());
                window.ethereum.on('accountsChanged', (accounts) => {
                    if (accounts.length > 0) connectAndEnforcePolygon();
                    else window.location.reload();
                });
            }
        };
    </script>
</body>
</html>
