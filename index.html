<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 Pony Race</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a2e; color: #ecf0f1; text-align: center; padding: 10px; }
        h1 { color: #f1c40f; margin-bottom: 5px; }
        
        /* Betting Board Styles */
        .betting-board { background: linear-gradient(145deg, #16213e, #0f172a); border: 2px solid #8247e5; border-radius: 12px; padding: 25px; max-width: 600px; margin: 0 auto 30px auto; box-shadow: 0 8px 32px rgba(130, 71, 229, 0.2); display: flex; flex-direction: column; gap: 20px; }
        .board-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding-bottom: 15px; }
        .board-header h2 { margin: 0; color: #ecf0f1; font-size: 1.5em; }
        .timer-display { background: #000; color: #00ffcc; padding: 8px 15px; border-radius: 6px; font-family: monospace; font-size: 1.4em; font-weight: bold; border: 1px solid #00ffcc; }
        
        /* Inputs & Controls */
        .input-group { display: flex; flex-direction: column; text-align: left; flex: 1; }
        .input-group label { font-size: 0.85em; color: #a0aec0; margin-bottom: 5px; text-transform: uppercase; font-weight: bold; }
        select, input { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid #4a5568; color: white; border-radius: 6px; font-size: 1em; box-sizing: border-box; }
        
        #connect-btn { padding: 12px; background: #2ecc71; color: white; border: none; border-radius: 6px; font-size: 1.1em; font-weight: bold; cursor: pointer; transition: 0.2s; }
        #connect-btn:hover:not(:disabled) { background: #27ae60; }
        
        .betting-controls { display: flex; gap: 15px; align-items: flex-end; }
        #race-btn { padding: 12px 25px; background: #8247e5; color: white; border: none; border-radius: 6px; font-size: 1.1em; font-weight: bold; cursor: pointer; transition: 0.2s; height: 44px; }
        #race-btn:hover:not(:disabled) { background: #9d68ec; }
        button:disabled { background: #4a5568 !important; color: #a0aec0 !important; cursor: not-allowed !important; }

        /* Track Styles */
        .track-container { width: 95%; max-width: 1000px; margin: 0 auto; background: #27ae60; border: 5px solid #ecf0f1; border-radius: 5px; position: relative; padding: 5px 0; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .lane { height: 40px; border-bottom: 2px dashed rgba(255, 255, 255, 0.4); position: relative; display: flex; align-items: center; }
        .lane:last-child { border-bottom: none; }
        .pony { font-size: 28px; position: absolute; left: 0%; transition: left 0.1s linear; z-index: 2; }
        .finish-line { position: absolute; right: 50px; top: 0; bottom: 0; width: 10px; background: repeating-linear-gradient(0deg, #fff, #fff 10px, #000 10px, #000 20px); z-index: 1; }
        .pony-name-label { position: absolute; left: 10px; color: white; font-weight: bold; font-size: 0.9em; text-shadow: 1px 1px 2px black; z-index: 3; }
        
        #message-board { margin-top: 20px; font-size: 1.3em; font-weight: bold; min-height: 30px; color: #f1c40f; }
    </style>
</head>
<body>

    <h1>🏁 Web3 Polygon Derby 🏁</h1>

    <div class="betting-board">
        <div class="board-header">
            <h2>Live Betting</h2>
            <div class="timer-display" id="race-timer">00:00</div>
        </div>

        <div style="background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 10px;">
            <div class="input-group" style="margin-bottom: 15px;">
                <label for="network-select">Select Network</label>
                <select id="network-select">
                    <option value="testnet" selected>Polygon Amoy Testnet (Free MATIC)</option>
                    <option value="mainnet">Polygon Mainnet (Real MATIC)</option>
                </select>
            </div>
            <button id="connect-btn" onclick="connectAndEnforceNetwork()">Connect Wallet</button>
            <div style="margin-top: 10px; font-size: 0.9em; color: #00ffcc;">Wallet: <span id="wallet-address">Not Connected</span></div>
            <div style="margin-top: 5px; font-size: 0.9em; color: #2ecc71; font-weight: bold;">Fake Bankroll: $<span id="bankroll">100</span></div>
        </div>

        <div class="betting-controls">
            <div class="input-group">
                <label for="pony-select">Select Pony</label>
                <select id="pony-select" disabled>
                    <option value="0">1. Thunder</option>
                    <option value="1">2. Hoof Hearted</option>
                    <option value="2">3. Glue Stick</option>
                    <option value="3">4. Lightning</option>
                    <option value="4">5. Usain Colt</option>
                </select>
            </div>
            <div class="input-group">
                <label for="bet-amount">Bet ($)</label>
                <input type="number" id="bet-amount" placeholder="e.g. 5" min="1" max="100" value="10" disabled>
            </div>
            <button id="race-btn" onclick="startRace()" disabled>Race!</button>
        </div>
    </div>

    <div class="track-container">
        <div class="finish-line"></div>
        <div class="lane"><span class="pony-name-label">Thunder</span><div class="pony" id="pony-0">🐎</div></div>
        <div class="lane"><span class="pony-name-label">Hoof Hearted</span><div class="pony" id="pony-1">🐎</div></div>
        <div class="lane"><span class="pony-name-label">Glue Stick</span><div class="pony" id="pony-2">🐎</div></div>
        <div class="lane"><span class="pony-name-label">Lightning</span><div class="pony" id="pony-3">🐎</div></div>
        <div class="lane"><span class="pony-name-label">Usain Colt</span><div class="pony" id="pony-4">🐎</div></div>
    </div>

    <div id="message-board">Please connect your Polygon wallet to play.</div>

    <script>
        // --- WEB3 CONNECTION LOGIC ---
        const NETWORKS = {
            mainnet: {
                chainId: '0x89',
                chainName: 'Polygon Mainnet',
                nativeCurrency: { name: 'MATIC', symbol: 'MATIC', decimals: 18 },
                rpcUrls: ['https://polygon-rpc.com/'],
                blockExplorerUrls: ['https://polygonscan.com/']
            },
            testnet: {
                chainId: '0x13882',
                chainName: 'Polygon Amoy Testnet',
                nativeCurrency: { name: 'MATIC', symbol: 'MATIC', decimals: 18 },
                rpcUrls: ['https://rpc-amoy.polygon.technology/'],
                blockExplorerUrls: ['https://amoy.polygonscan.com/']
            }
        };

        let userWalletAddress = null;

        function setMessage(msg, color = "#f1c40f") {
            const msgBoard = document.getElementById('message-board');
            msgBoard.innerText = msg;
            msgBoard.style.color = color;
        }

        function checkWalletAvailability() {
            const connectBtn = document.getElementById('connect-btn');
            if (typeof window.ethereum === 'undefined') {
                setMessage("❌ No Web3 wallet detected! Please install MetaMask extension.", "#e74c3c");
                connectBtn.innerText = "MetaMask Required";
                connectBtn.disabled = true;
                return false;
            }
            return true;
        }

        async function connectAndEnforceNetwork() {
            if (!checkWalletAvailability()) return;

            const selectedNetworkKey = document.getElementById('network-select').value;
            const targetNetwork = NETWORKS[selectedNetworkKey];

            try {
                setMessage(`Connecting to ${targetNetwork.chainName}...`, "#00ffcc");
                
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                const currentChainId = await window.ethereum.request({ method: 'eth_chainId' });

                if (currentChainId !== targetNetwork.chainId) {
                    setMessage(`Switching to ${targetNetwork.chainName}...`, "#f1c40f");
                    try {
                        await window.ethereum.request({ 
                            method: 'wallet_switchEthereumChain', 
                            params: [{ chainId: targetNetwork.chainId }] 
                        });
                    } catch (switchError) {
                        if (switchError.code === 4902) {
                            try {
                                setMessage(`Adding ${targetNetwork.chainName} to wallet...`, "#f1c40f");
                                await window.ethereum.request({
                                    method: 'wallet_addEthereumChain',
                                    params: [targetNetwork],
                                });
                            } catch (addError) {
                                setMessage("Failed to add network.", "#e74c3c");
                                return;
                            }
                        } else {
                            setMessage("Network switch rejected.", "#e74c3c");
                            return;
                        }
                    }
                }

                userWalletAddress = accounts[0];
                document.getElementById('wallet-address').innerText = userWalletAddress.substring(0, 6) + "..." + userWalletAddress.substring(38);
                
                document.getElementById('connect-btn').style.display = "none"; 
                document.getElementById('network-select').disabled = true; 
                
                document.getElementById('pony-select').disabled = false;
                document.getElementById('bet-amount').disabled = false;
                document.getElementById('race-btn').disabled = false;
                
                setMessage(`✅ Connected to ${targetNetwork.chainName}!`);
            } catch (error) {
                setMessage("Connection failed. Did you close the MetaMask popup?", "#e74c3c");
                console.error("MetaMask Error:", error);
            }
        }

        window.onload = function() {
            checkWalletAvailability();
            if (window.ethereum) {
                window.ethereum.on('chainChanged', () => window.location.reload());
                window.ethereum.on('accountsChanged', (accounts) => {
                    if (accounts.length === 0) window.location.reload(); 
                });
            }
        };

        // --- GAME ANIMATION LOGIC (5 Ponies for visual clarity) ---
        let bankroll = 100;
        const ponies = ["Thunder", "Hoof Hearted", "Glue Stick", "Lightning", "Usain Colt"];
        let isRacing = false;

        function startRace() {
            if (isRacing || !userWalletAddress) return;

            const betInput = document.getElementById('bet-amount');
            const betAmount = parseInt(betInput.value);
            const selectedPonyIndex = parseInt(document.getElementById('pony-select').value);

            if (isNaN(betAmount) || betAmount <= 0 || betAmount > bankroll) {
                setMessage("Invalid bet amount!", "#e74c3c"); return;
            }

            bankroll -= betAmount;
            document.getElementById('bankroll').innerText = bankroll;
            isRacing = true;
            document.getElementById('race-btn').disabled = true;
            document.getElementById('pony-select').disabled = true;
            betInput.disabled = true;

            setMessage("🎺 AND THEY'RE OFF! 🎺");

            const ponyElements = [];
            for (let i = 0; i < ponies.length; i++) {
                let el = document.getElementById('pony-' + i);
                el.style.left = "0%";
                ponyElements.push(el);
            }
            
            let positions = new Array(ponies.length).fill(0);
            let finishOrder = []; 
            const finishLinePercentage = 88; 
            
            const raceInterval = setInterval(() => {
                for (let i = 0; i < ponies.length; i++) {
                    if (!finishOrder.includes(i)) {
                        positions[i] += (Math.random() * 2.5) + 0.5;
                        ponyElements[i].style.left = positions[i] + "%";
                        if (positions[i] >= finishLinePercentage) finishOrder.push(i);
                    }
                }

                if (finishOrder.length >= 3) {
                    clearInterval(raceInterval);
                    handleRaceResults(finishOrder, selectedPonyIndex, betAmount);
                }
            }, 100); 
        }

        function handleRaceResults(finishOrder, betIndex, betAmount) {
            const first = finishOrder[0];
            const second = finishOrder[1];
            const third = finishOrder[2];

            let message = `🏁 1st: ${ponies[first]} | 2nd: ${ponies[second]} | 3rd: ${ponies[third]}\n`;

            if (betIndex === first) {
                const winnings = betAmount * 5; 
                bankroll += winnings;
                setMessage(message + `🥇 You won 1st Place! (+$${winnings})`, "#2ecc71");
            } else if (betIndex === second) {
                const winnings = Math.floor(betAmount * 2.5); 
                bankroll += winnings;
                setMessage(message + `🥈 You won 2nd Place! (+$${winnings})`, "#3498db");
            } else if (betIndex === third) {
                const winnings = Math.floor(betAmount * 1.5); 
                bankroll += winnings;
                setMessage(message + `🥉 You won 3rd Place! (+$${winnings})`, "#f39c12");
            } else {
                setMessage(message + `💸 You lost $${betAmount}.`, "#e74c3c");
            }

            document.getElementById('bankroll').innerText = bankroll;
            document.getElementById('bet-amount').max = bankroll;
            
            if (bankroll <= 0) {
                setMessage("💀 Out of money! Refresh to play again.", "#c0392b");
            } else {
                isRacing = false;
                document.getElementById('race-btn').disabled = false;
                document.getElementById('pony-select').disabled = false;
                document.getElementById('bet-amount').disabled = false;
            }
        }
    </script>
</body>
</html>
